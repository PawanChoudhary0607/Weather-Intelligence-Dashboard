<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Intelligence Dashboard &mdash; Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="page">
    <main class="panel panel--error">
        <p class="panel--error__label">Something went wrong</p>
        <p class="panel--error__message" th:text="${errorMessage}">An unexpected error occurred.</p>
        <p class="panel--error__hint"><a href="/">Return to the dashboard</a></p>
    </main>
</div>
</body>
</html>
