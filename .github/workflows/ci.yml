name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        env:
          OPENWEATHERMAP_API_KEY: ci-placeholder-key
        run: ./mvnw -B clean verify

      - name: Build Docker image
        run: docker build -t weather-intelligence-dashboard:ci .
